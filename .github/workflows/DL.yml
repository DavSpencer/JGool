name: DL-

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URLs — one per line. To rename: URL | Custom Name (extension auto-kept)'
        required: true
        type: string
      quality:
        description: 'Video Quality'
        required: true
        type: choice
        options:
          - '1080p MP4'
          - '720p MP4'
          - '480p MP4'
          - '360p MP4'
          - '1080p WebM'
          - '720p WebM'
          - '480p WebM'
          - '360p WebM'
          - 'Audio MP3'
          - 'Best'
      subtitles:
        description: 'Subtitles — embed into video (MP4/MKV only; WebM saves as .vtt)'
        required: false
        type: choice
        default: 'None'
        options:
          - 'None'
          - 'English (Manual)'
          - 'English (Auto-Generated)'
          - 'English (Manual + Auto)'
          - 'Persian (Manual)'
          - 'Persian (Auto-Generated)'
          - 'Persian (Manual + Auto)'
          - 'Persian + English'
      zip_mode:
        description: 'ZIP Mode'
        required: false
        type: choice
        default: 'Auto (ZIP only if >95MB)'
        options:
          - 'Auto (ZIP only if >95MB)'
          - 'Individual ZIP (one zip per file)'
          - 'Bundle ZIP (all files in one zip)'
      password:
        description: 'ZIP Password (Optional)'
        required: false
        type: string
        default: ''

jobs:
  download-and-save:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fast Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends aria2 ffmpeg

          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          pip install --upgrade yt-dlp

          curl -fsSL https://bun.com/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Setup YouTube Cookies
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > youtube_cookies.txt
          else
            touch youtube_cookies.txt
          fi

      - name: Setup PornHub Cookies
        env:
          PH_COOKIES: ${{ secrets.PH_COOKIES }}
        run: |
          if [ -n "$PH_COOKIES" ]; then
            echo "$PH_COOKIES" > ph_cookies.txt
          else
            touch ph_cookies.txt
          fi

      - name: Setup Bunkr script
        run: |
          cat << 'EOF' > bunkr.py
          import os, sys, json, time, base64, requests
          from math import floor
          from itertools import cycle
          from urllib.parse import urlparse

          BUNKRR_API = "https://bunkr.cr/api/vs"
          BUNKRR_DOMAINS = ("bunkr.si", "bunkr.fi", "bunkr.ru", "bunkr.cr", "bunkr.rip", "bunkrr.su")
          BUNKRR_DOWNLOAD_HEADERS = {"User-Agent": "Mozilla/5.0", "Referer": "https://get.bunkrr.su/"}
          _offline_subs = set()

          def is_bunkr_url(url): return any(dom in url for dom in BUNKRR_DOMAINS)

          def get_slug(url): return __import__("re").search(r"/([a-zA-Z0-9_-]+)$", url).group(1) if __import__("re").search(r"/([a-zA-Z0-9_-]+)$", url) else None

          def fetch_api(url):
              slug = get_slug(url)
              if not slug: return None
              for dom in (BUNKRR_API.split("/")[2], *_offline_subs):
                  try:
                      resp = requests.post(f"https://{dom}/api/vs", json={"slug": slug}, headers=BUNKRR_DOWNLOAD_HEADERS, timeout=30)
                      if resp.status_code == 200: return resp.json()
                      if resp.status_code == 502: _offline_subs.add(dom)
                  except: continue
              return None

          def decrypt(api_resp):
              try:
                  t, enc = api_resp["timestamp"], base64.b64decode(api_resp["url"])
                  dec = bytearray(b ^ next(cycle(f"SECRET_KEY_{floor(t/3600)}".encode("utf-8"))) for b in enc)
                  return dec.decode("utf-8", errors="ignore")
              except: return None

          if __name__ == "__main__":
              url = sys.argv[1]
              outdir = sys.argv[2]
              api_resp = fetch_api(url)
              dl_link = decrypt(api_resp) if api_resp else None
              if dl_link:
                  filepath = os.path.join(outdir, urlparse(dl_link).path.rstrip("/").split("/")[-1])
                  resp = requests.get(dl_link, headers=BUNKRR_DOWNLOAD_HEADERS, stream=True)
                  with open(filepath, "wb") as f:
                      for c in resp.iter_content(8192): f.write(c) if c else None
          EOF

      - name: Download & Process Files (Supports Multiple URLs)
        shell: bash
        run: |
          RAW_URLS="${{ github.event.inputs.url }}"
          QUALITY="${{ github.event.inputs.quality }}"
          SUBTITLES="${{ github.event.inputs.subtitles }}"

          rm -rf tmp_downloads
          mkdir -p tmp_downloads dl

          # ── Build yt-dlp format string ──────────────────────────────────────
          case "$QUALITY" in
            "1080p MP4")
              YTDLP_F="-f bestvideo[ext=mp4][height<=1080]+bestaudio[ext=m4a]/best[ext=mp4][height<=1080]/best --merge-output-format mp4"
              ;;
            "720p MP4")
              YTDLP_F="-f bestvideo[ext=mp4][height<=720]+bestaudio[ext=m4a]/best[ext=mp4][height<=720]/best --merge-output-format mp4"
              ;;
            "480p MP4")
              YTDLP_F="-f bestvideo[ext=mp4][height<=480]+bestaudio[ext=m4a]/best[ext=mp4][height<=480]/best --merge-output-format mp4"
              ;;
            "360p MP4")
              YTDLP_F="-f bestvideo[ext=mp4][height<=360]+bestaudio[ext=m4a]/best[ext=mp4][height<=360]/best --merge-output-format mp4"
              ;;
            "1080p WebM")
              YTDLP_F="-f bestvideo[ext=webm][height<=1080]+bestaudio[ext=webm]/bestvideo[height<=1080]+bestaudio/best[height<=1080] --merge-output-format webm"
              ;;
            "720p WebM")
              YTDLP_F="-f bestvideo[ext=webm][height<=720]+bestaudio[ext=webm]/bestvideo[height<=720]+bestaudio/best[height<=720] --merge-output-format webm"
              ;;
            "480p WebM")
              YTDLP_F="-f bestvideo[ext=webm][height<=480]+bestaudio[ext=webm]/bestvideo[height<=480]+bestaudio/best[height<=480] --merge-output-format webm"
              ;;
            "360p WebM")
              YTDLP_F="-f bestvideo[ext=webm][height<=360]+bestaudio[ext=webm]/bestvideo[height<=360]+bestaudio/best[height<=360] --merge-output-format webm"
              ;;
            "Audio MP3")
              YTDLP_F="-x --audio-format mp3"
              ;;
            *)
              # Best — let yt-dlp decide
              YTDLP_F="--merge-output-format mp4"
              ;;
          esac

          # ── Build subtitle flags + filename suffix ──────────────────────────
          # --embed-subs works with MP4/MKV only; WebM saves subs as .vtt files
          # --ignore-errors skips unavailable/rate-limited languages gracefully
          # SUB_SUFFIX is appended to the filename: e.g. "Video Title [EN-FA].mp4"
          SUB_F=""
          SUB_SUFFIX=""
          case "$SUBTITLES" in
            "English (Manual)")
              SUB_F="--write-subs --embed-subs --sub-langs en --ignore-errors"
              SUB_SUFFIX=" [EN]"
              ;;
            "English (Auto-Generated)")
              SUB_F="--write-auto-subs --embed-subs --sub-langs en --ignore-errors"
              SUB_SUFFIX=" [EN]"
              ;;
            "English (Manual + Auto)")
              SUB_F="--write-subs --write-auto-subs --embed-subs --sub-langs en --ignore-errors"
              SUB_SUFFIX=" [EN]"
              ;;
            "Persian (Manual)")
              SUB_F="--write-subs --embed-subs --sub-langs fa --ignore-errors"
              SUB_SUFFIX=" [FA]"
              ;;
            "Persian (Auto-Generated)")
              SUB_F="--write-auto-subs --embed-subs --sub-langs fa --ignore-errors"
              SUB_SUFFIX=" [FA]"
              ;;
            "Persian (Manual + Auto)")
              SUB_F="--write-subs --write-auto-subs --embed-subs --sub-langs fa --ignore-errors"
              SUB_SUFFIX=" [FA]"
              ;;
            "Persian + English")
              SUB_F="--write-subs --write-auto-subs --embed-subs --sub-langs fa,en --ignore-errors"
              SUB_SUFFIX=" [EN-FA]"
              ;;
            *)
              SUB_F=""
              SUB_SUFFIX=""
              ;;
          esac

          # ── Parse URLs line by line — supports "URL | Custom Name" syntax ──
          # Each line can be:  https://example.com/file.apk | My App Name
          # or just:           https://example.com/file.apk
          # Commas are treated as line separators for backward compatibility.
          mapfile -t URL_LINES < <(echo "$RAW_URLS" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$')

          for LINE in "${URL_LINES[@]}"; do
            # Split on " | " to get URL and optional custom name
            if echo "$LINE" | grep -q ' | '; then
              ACTUAL_URL=$(echo "$LINE" | sed 's/ |.*//' | xargs)
              CUSTOM_NAME=$(echo "$LINE" | sed 's/.*| //' | xargs)
            else
              ACTUAL_URL=$(echo "$LINE" | xargs)
              CUSTOM_NAME=""
            fi

            [ -z "$ACTUAL_URL" ] && continue
            URL="$ACTUAL_URL"

            echo "==========================================="
            echo "Processing URL: $URL"
            [ -n "$CUSTOM_NAME" ] && echo "Custom name : ${CUSTOM_NAME}"
            echo "==========================================="

            # Snapshot tmp_downloads BEFORE download so we can detect new files
            # and rename them when a custom name is provided (aria2/bunkr/magnet)
            ls tmp_downloads/ 2>/dev/null | sort > /tmp/before_dl.txt || touch /tmp/before_dl.txt

            if echo "$URL" | grep -qE "(bunkr\.si|bunkr\.fi|bunkr\.ru|bunkr\.cr|bunkr\.rip|bunkrr\.su)"; then
              echo "Downloading from Bunkr..."
              python3 bunkr.py "$URL" "tmp_downloads"

            elif echo "$URL" | grep -qE "(pornhub\.com|phub\.net)"; then
              echo "Downloading from PornHub with yt-dlp..."

              COOKIE_ARG=""
              [ -s ph_cookies.txt ] && COOKIE_ARG="--cookies ph_cookies.txt"

              if [ -n "$CUSTOM_NAME" ]; then
                YTDLP_OUT="tmp_downloads/${CUSTOM_NAME}${SUB_SUFFIX}.%(ext)s"
              else
                YTDLP_OUT="tmp_downloads/%(title)s${SUB_SUFFIX}.%(ext)s"
              fi

              yt-dlp \
                --js-runtimes bun:$HOME/.bun/bin/bun \
                --remote-components ejs:github \
                $COOKIE_ARG \
                $YTDLP_F \
                $SUB_F \
                --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
                --add-header "Referer:https://www.pornhub.com/" \
                --add-header "Accept-Language:en-US,en;q=0.9" \
                -o "$YTDLP_OUT" \
                "$URL"

            elif echo "$URL" | grep -qE "(youtube\.com|youtu\.be|twitch\.tv|reddit\.com|vimeo|soundcloud)"; then
              echo "Downloading with yt-dlp..."
              COOKIE_ARG=""
              [ -s youtube_cookies.txt ] && COOKIE_ARG="--cookies youtube_cookies.txt"

              if [ -n "$CUSTOM_NAME" ]; then
                YTDLP_OUT="tmp_downloads/${CUSTOM_NAME}${SUB_SUFFIX}.%(ext)s"
              else
                YTDLP_OUT="tmp_downloads/%(title)s${SUB_SUFFIX}.%(ext)s"
              fi

              yt-dlp \
                --js-runtimes bun:$HOME/.bun/bin/bun \
                --remote-components ejs:github \
                $COOKIE_ARG \
                $YTDLP_F \
                $SUB_F \
                -o "$YTDLP_OUT" \
                "$URL"

            elif echo "$URL" | grep -qi "^magnet:"; then
              # ⚠️  TORRENT / MAGNET WARNING:
              # GitHub Actions jobs have a 6-hour hard limit. Large or slow torrents
              # WILL get killed mid-download with no output saved. This works reliably
              # only for small (<1GB) and well-seeded torrents. There is also no
              # guarantee the runner IP is not blocked by some trackers.
              echo "Magnet/Torrent detected — downloading with aria2c..."
              echo "⚠️  WARNING: GitHub Actions has a 6h job limit. Large torrents may not finish."
              aria2c \
                --enable-dht=true \
                --enable-peer-exchange=true \
                --bt-save-metadata=true \
                --seed-time=0 \
                --max-connection-per-server=4 \
                --split=4 \
                --bt-stop-timeout=300 \
                --timeout=300 \
                --max-tries=5 \
                --dir="tmp_downloads" \
                "$URL"

            else
              echo "Downloading direct file with aria2..."
              aria2c --split=2 --max-connection-per-server=2 --dir="tmp_downloads" "$URL"
            fi

            # ── Post-download rename (bunkr / aria2 / magnet only) ───────────
            # yt-dlp already uses CUSTOM_NAME in its -o template above.
            # For other sources: diff the directory snapshot to find new files,
            # then rename each one to CUSTOM_NAME (+ SUB_SUFFIX) keeping extension.
            if [ -n "$CUSTOM_NAME" ]; then
              ls tmp_downloads/ 2>/dev/null | sort > /tmp/after_dl.txt || touch /tmp/after_dl.txt
              mapfile -t NEW_FILES < <(comm -13 /tmp/before_dl.txt /tmp/after_dl.txt)
              for NEW_FILE in "${NEW_FILES[@]}"; do
                EXT="${NEW_FILE##*.}"
                NEW_NAME="${CUSTOM_NAME}${SUB_SUFFIX}.${EXT}"
                if [ "$NEW_FILE" != "$NEW_NAME" ]; then
                  echo "Renaming: $NEW_FILE → $NEW_NAME"
                  mv "tmp_downloads/${NEW_FILE}" "tmp_downloads/${NEW_NAME}"
                fi
              done
            fi
          done

      - name: Zip & Split
        shell: bash
        run: |
          HAS_PASS="${{ github.event.inputs.password }}"
          ZIP_MODE="${{ github.event.inputs.zip_mode }}"
          LIMIT=$((95 * 1024 * 1024))

          # Remove junk files from tmp_downloads before any zipping:
          # - .vtt  — subtitle sidecars written by yt-dlp (already embedded in video)
          # - .aria2 — aria2c control/resume files, not part of the actual download
          rm -f tmp_downloads/*.vtt tmp_downloads/*.aria2

          PASS_ARG=""
          [ -n "$HAS_PASS" ] && PASS_ARG="-P $HAS_PASS"

          # ── Helper: list .zip then numbered split parts into new_files.txt ──
          # Two separate loops — z[0-9]* never matches .zip, so no duplicates
          list_zip_parts() {
            local BASE="$1"
            local STEM="${BASE%.zip}"
            [ -f "${BASE}" ] && basename "${BASE}" >> new_files.txt
            for PART in "${STEM}".z[0-9]*; do
              [ -f "$PART" ] && basename "$PART" >> new_files.txt
            done
          }

          # ── Smart bundle name: first-file-stem + "+Nx" if multiple ──────────
          # Sanitize: strip non-ASCII, replace spaces with underscores, trim length.
          # Prevents zip failing on Persian/Arabic/CJK filenames with spaces.
          make_bundle_name() {
            local COUNT
            COUNT=$(find tmp_downloads -maxdepth 1 -type f | wc -l)
            local FIRST
            FIRST=$(find tmp_downloads -maxdepth 1 -type f | sort | head -1)
            local STEM
            STEM=$(basename "$FIRST")
            STEM="${STEM%.*}"
            # Strip non-ASCII, spaces → underscores, remove remaining unsafe chars
            STEM=$(echo "$STEM" | sed 's/[^\x00-\x7F]//g' | tr ' ' '_' | tr -cd '[:alnum:]_.-')
            STEM="${STEM:0:40}"
            # Fallback: fully non-ASCII title (e.g. all Persian) becomes "bundle"
            [ -z "$STEM" ] && STEM="bundle"
            local TIMESTAMP
            TIMESTAMP=$(TZ='Asia/Tehran' date +'%Y%m%d_%H%M')
            if [ "$COUNT" -gt 1 ]; then
              echo "${STEM}+$((COUNT-1))more_${TIMESTAMP}.zip"
            else
              echo "${STEM}_${TIMESTAMP}.zip"
            fi
          }

          # ════════════════════════════════════════════════════════════════════
          # BUNDLE ZIP — all files packed into one archive, split if >95MB
          # Uses mapfile+find instead of glob so filenames with spaces/special
          # characters (common in direct APK/file URLs) are handled safely.
          # ════════════════════════════════════════════════════════════════════
          if [ "$ZIP_MODE" = "Bundle ZIP (all files in one zip)" ]; then
            mapfile -t BUNDLE_FILES < <(find tmp_downloads -maxdepth 1 -type f | sort)
            if [ ${#BUNDLE_FILES[@]} -eq 0 ]; then
              echo "No files found to bundle — skipping."
            else
              BUNDLE_NAME=$(make_bundle_name)
              echo "Bundling ${#BUNDLE_FILES[@]} file(s) into: $BUNDLE_NAME"
              zip $PASS_ARG -s 95m "dl/${BUNDLE_NAME}" -j "${BUNDLE_FILES[@]}"
              list_zip_parts "dl/${BUNDLE_NAME}"
            fi

          # ════════════════════════════════════════════════════════════════════
          # INDIVIDUAL ZIP — one zip per file (always zipped), split if >95MB
          # ════════════════════════════════════════════════════════════════════
          elif [ "$ZIP_MODE" = "Individual ZIP (one zip per file)" ]; then
            while IFS= read -r -d '' FILE; do
              BASENAME=$(basename "$FILE")
              rm -f "dl/${BASENAME}.zip" "dl/${BASENAME}".z[0-9]*
              echo "Zipping: $BASENAME"
              zip $PASS_ARG -s 95m "dl/${BASENAME}.zip" -j "$FILE"
              list_zip_parts "dl/${BASENAME}.zip"
            done < <(find tmp_downloads -maxdepth 1 -type f -print0 | sort -z)

          # ════════════════════════════════════════════════════════════════════
          # AUTO — zip/split only if file exceeds 95MB or password is set
          # ════════════════════════════════════════════════════════════════════
          else
            for FILE in tmp_downloads/*; do
              [ -f "$FILE" ] || continue
              SIZE=$(stat -c%s "$FILE")
              BASENAME=$(basename "$FILE")
              rm -f "dl/${BASENAME}.zip" "dl/${BASENAME}".z[0-9]*

              if [ -n "$HAS_PASS" ] || [ "$SIZE" -gt "$LIMIT" ]; then
                echo "Zipping/Splitting: $BASENAME"
                zip $PASS_ARG -s 95m "dl/${BASENAME}.zip" -j "$FILE"
                list_zip_parts "dl/${BASENAME}.zip"
              else
                echo "Under 95MB, no password — copying raw: $BASENAME"
                cp -f "$FILE" "dl/$BASENAME"
                echo "$BASENAME" >> new_files.txt
              fi
            done
          fi

          rm -rf tmp_downloads

      - name: Update Links.md
        shell: bash
        run: |
          [ ! -f new_files.txt ] && exit 0

          REPO="${{ github.repository }}"
          BRANCH="${GITHUB_REF_NAME}"

          HEADER="## 🔗 Direct Download Links\n> Click on any link below to start downloading directly.<br><br/>\n\n"

          echo "### 📅 $(TZ='Asia/Tehran' date +'%Y-%m-%d %H:%M') IR" > current_run.md

          while IFS= read -r FNAME; do
            ENCODED_NAME=$(python3 -c "import urllib.parse; print(urllib.parse.quote(input()))" <<< "$FNAME")
            RAW_URL="https://github.com/$REPO/raw/$BRANCH/dl/$ENCODED_NAME"

            DISPLAY_NAME=$(echo "$FNAME" | sed -E 's/android[0-9]+\+_//g; s/-release//g')

            export FNAME_ENV="$FNAME"
            SIZE_STR=$(python3 -c "import os; fname = os.environ.get('FNAME_ENV'); path = f'dl/{fname}'; size = os.path.getsize(path) if os.path.exists(path) else 0; print(f'{size/1048576:.1f}MB' if size >= 1048576 else f'{size//1024}KB')")

            EXT="${FNAME##*.}"
            case "$EXT" in
              apk)                  ICON="📱" ;;
              mp4|mkv|avi|mov|webm) ICON="🎬" ;;
              mp3|m4a|flac|ogg)     ICON="🎵" ;;
              zip|z[0-9]*)          ICON="🗜️" ;;
              *)                    ICON="📥" ;;
            esac

            echo "- $ICON [$DISPLAY_NAME]($RAW_URL) \`$SIZE_STR\`" >> current_run.md
            echo "" >> current_run.md
          done < new_files.txt

          echo "---" >> current_run.md
          echo "" >> current_run.md

          if [ -f Links.md ]; then
            tail -n +4 Links.md > old_links.md 2>/dev/null || touch old_links.md
            echo -e "$HEADER" > Links.md
            cat current_run.md old_links.md >> Links.md
            rm old_links.md
          else
            echo -e "$HEADER" > Links.md
            cat current_run.md >> Links.md
          fi

          rm -f new_files.txt current_run.md

      - name: Push to Repository
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "NET-Sentinel Bot"
          git config user.email "224584266+NetSentinel-Bot@users.noreply.github.com"
          git add dl/ Links.md
          git commit -m "Add downloaded files via Panel [skip ci]" || echo "Nothing to commit"
          # Pull with rebase before pushing to avoid rejection when another run
          # committed to the same branch between our checkout and this push.
          git pull --rebase origin "$BRANCH"
          git push origin HEAD:$BRANCH
