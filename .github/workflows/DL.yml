name: JGool - DL

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Target URLs (Separate with space, comma, or new line)'
        required: true
        type: string
      quality:
        description: 'Video Quality'
        required: true
        type: choice
        options:
          - '1080p MP4'
          - '720p MP4'
          - '480p MP4'
          - '360p MP4'
          - '1080p WebM'
          - '720p WebM'
          - '480p WebM'
          - '360p WebM'
          - 'Audio MP3'
          - 'Best'
      subtitles:
        description: 'Subtitles — embed into video (MP4 only)'
        required: false
        type: choice
        default: 'None'
        options:
          - 'None'
          - 'English (Manual)'
          - 'English (Auto-Generated)'
          - 'English (Manual + Auto)'
          - 'Persian (Manual)'
          - 'Persian (Auto-Generated)'
          - 'Persian (Manual + Auto)'
          - 'Persian + English'
      force_zip:
        description: 'Force ZIP (even if under 95MB)'
        required: false
        type: boolean
        default: false
      password:
        description: 'ZIP Password (Optional)'
        required: false
        type: string
        default: ''

jobs:
  download-and-save:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fast Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends aria2 ffmpeg

          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          pip install --upgrade yt-dlp

          curl -fsSL https://bun.com/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Setup YouTube Cookies
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > youtube_cookies.txt
          else
            touch youtube_cookies.txt
          fi

      - name: Setup PornHub Cookies
        env:
          PH_COOKIES: ${{ secrets.PH_COOKIES }}
        run: |
          if [ -n "$PH_COOKIES" ]; then
            echo "$PH_COOKIES" > ph_cookies.txt
          else
            touch ph_cookies.txt
          fi

      - name: Setup Bunkr script
        run: |
          cat << 'EOF' > bunkr.py
          import os, sys, json, time, base64, requests
          from math import floor
          from itertools import cycle
          from urllib.parse import urlparse

          BUNKRR_API = "https://bunkr.cr/api/vs"
          BUNKRR_DOMAINS = ("bunkr.si", "bunkr.fi", "bunkr.ru", "bunkr.cr", "bunkr.rip", "bunkrr.su")
          BUNKRR_DOWNLOAD_HEADERS = {"User-Agent": "Mozilla/5.0", "Referer": "https://get.bunkrr.su/"}
          _offline_subs = set()

          def is_bunkr_url(url): return any(dom in url for dom in BUNKRR_DOMAINS)

          def get_slug(url): return __import__("re").search(r"/([a-zA-Z0-9_-]+)$", url).group(1) if __import__("re").search(r"/([a-zA-Z0-9_-]+)$", url) else None

          def fetch_api(url):
              slug = get_slug(url)
              if not slug: return None
              for dom in (BUNKRR_API.split("/")[2], *_offline_subs):
                  try:
                      resp = requests.post(f"https://{dom}/api/vs", json={"slug": slug}, headers=BUNKRR_DOWNLOAD_HEADERS, timeout=30)
                      if resp.status_code == 200: return resp.json()
                      if resp.status_code == 502: _offline_subs.add(dom)
                  except: continue
              return None

          def decrypt(api_resp):
              try:
                  t, enc = api_resp["timestamp"], base64.b64decode(api_resp["url"])
                  dec = bytearray(b ^ next(cycle(f"SECRET_KEY_{floor(t/3600)}".encode("utf-8"))) for b in enc)
                  return dec.decode("utf-8", errors="ignore")
              except: return None

          if __name__ == "__main__":
              url = sys.argv[1]
              outdir = sys.argv[2]
              api_resp = fetch_api(url)
              dl_link = decrypt(api_resp) if api_resp else None
              if dl_link:
                  filepath = os.path.join(outdir, urlparse(dl_link).path.rstrip("/").split("/")[-1])
                  resp = requests.get(dl_link, headers=BUNKRR_DOWNLOAD_HEADERS, stream=True)
                  with open(filepath, "wb") as f:
                      for c in resp.iter_content(8192): f.write(c) if c else None
          EOF

      - name: Download & Process Files (Supports Multiple URLs)
        shell: bash
        run: |
          RAW_URLS="${{ github.event.inputs.url }}"
          QUALITY="${{ github.event.inputs.quality }}"
          SUBTITLES="${{ github.event.inputs.subtitles }}"

          FORMATTED_URLS=$(echo "$RAW_URLS" | tr ',' ' ' | tr '\n' ' ')

          rm -rf tmp_downloads
          mkdir -p tmp_downloads dl

          # ── Build yt-dlp format string ──────────────────────────────────────
          case "$QUALITY" in
            "1080p MP4")
              YTDLP_F="-f bestvideo[ext=mp4][height<=1080]+bestaudio[ext=m4a]/best[ext=mp4][height<=1080]/best --merge-output-format mp4"
              ;;
            "720p MP4")
              YTDLP_F="-f bestvideo[ext=mp4][height<=720]+bestaudio[ext=m4a]/best[ext=mp4][height<=720]/best --merge-output-format mp4"
              ;;
            "480p MP4")
              YTDLP_F="-f bestvideo[ext=mp4][height<=480]+bestaudio[ext=m4a]/best[ext=mp4][height<=480]/best --merge-output-format mp4"
              ;;
            "360p MP4")
              YTDLP_F="-f bestvideo[ext=mp4][height<=360]+bestaudio[ext=m4a]/best[ext=mp4][height<=360]/best --merge-output-format mp4"
              ;;
            "1080p WebM")
              YTDLP_F="-f bestvideo[ext=webm][height<=1080]+bestaudio[ext=webm]/bestvideo[height<=1080]+bestaudio/best[height<=1080] --merge-output-format webm"
              ;;
            "720p WebM")
              YTDLP_F="-f bestvideo[ext=webm][height<=720]+bestaudio[ext=webm]/bestvideo[height<=720]+bestaudio/best[height<=720] --merge-output-format webm"
              ;;
            "480p WebM")
              YTDLP_F="-f bestvideo[ext=webm][height<=480]+bestaudio[ext=webm]/bestvideo[height<=480]+bestaudio/best[height<=480] --merge-output-format webm"
              ;;
            "360p WebM")
              YTDLP_F="-f bestvideo[ext=webm][height<=360]+bestaudio[ext=webm]/bestvideo[height<=360]+bestaudio/best[height<=360] --merge-output-format webm"
              ;;
            "Audio MP3")
              YTDLP_F="-x --audio-format mp3"
              ;;
            *)
              YTDLP_F="--merge-output-format mp4"
              ;;
          esac

          # ── Static subtitle flags & tags ────────────────────────────────────
          # NEEDS_DETECTION=true  → per-URL --list-subs probe required
          # DETECT_FA / DETECT_EN → which languages to probe when detecting
          BASE_SUB_F=""
          STATIC_SUB_TAG=""
          NEEDS_DETECTION=false
          DETECT_FA=false
          DETECT_EN=false

          case "$SUBTITLES" in
            "English (Manual)")
              BASE_SUB_F="--write-subs --embed-subs --sub-langs en --ignore-errors"
              STATIC_SUB_TAG="[EN]"
              ;;
            "English (Auto-Generated)")
              BASE_SUB_F="--write-auto-subs --embed-subs --sub-langs en --ignore-errors"
              STATIC_SUB_TAG="[EN-Auto]"
              ;;
            "English (Manual + Auto)")
              # Tag reflects whichever source actually exists (manual preferred)
              NEEDS_DETECTION=true; DETECT_FA=false; DETECT_EN=true
              ;;
            "Persian (Manual)")
              BASE_SUB_F="--write-subs --embed-subs --sub-langs fa --ignore-errors"
              STATIC_SUB_TAG="[FA]"
              ;;
            "Persian (Auto-Generated)")
              BASE_SUB_F="--write-auto-subs --embed-subs --sub-langs fa --ignore-errors"
              STATIC_SUB_TAG="[FA-Auto]"
              ;;
            "Persian (Manual + Auto)")
              # Tag reflects whichever source actually exists (manual preferred)
              NEEDS_DETECTION=true; DETECT_FA=true; DETECT_EN=false
              ;;
            "Persian + English")
              # Per-URL detection: manual preferred per lang, auto as fallback, skip if neither
              NEEDS_DETECTION=true; DETECT_FA=true; DETECT_EN=true
              ;;
            *)
              BASE_SUB_F=""
              STATIC_SUB_TAG=""
              ;;
          esac

          # ── Subtitle detection helper ───────────────────────────────────────
          # Probes --list-subs for a URL and populates SUB_F_DETECTED + SUB_TAG_DETECTED.
          # Priority: manual → auto-generated → skip (per language independently).
          detect_subs_for_url() {
            local url="$1" cookie_arg="$2" want_fa="$3" want_en="$4"
            SUB_F_DETECTED=""
            SUB_TAG_DETECTED=""

            local list_out
            list_out=$(yt-dlp --list-subs $cookie_arg "$url" 2>/dev/null)

            local FA_MANUAL=false FA_AUTO=false EN_MANUAL=false EN_AUTO=false
            local section=""

            while IFS= read -r line; do
              echo "$line" | grep -qi "Available subtitles"                && section="manual"
              echo "$line" | grep -qi "automatic captions\|auto.*captions" && section="auto"

              if [ "$section" = "manual" ]; then
                echo "$line" | grep -qE "^fa[[:space:]]" && FA_MANUAL=true
                echo "$line" | grep -qE "^en[[:space:]]" && EN_MANUAL=true
              elif [ "$section" = "auto" ]; then
                echo "$line" | grep -qE "^fa[[:space:]]" && FA_AUTO=true
                echo "$line" | grep -qE "^en[[:space:]]" && EN_AUTO=true
              fi
            done <<< "$list_out"

            local need_manual=false need_auto=false langs=""

            if [ "$want_fa" = "true" ]; then
              if $FA_MANUAL; then
                need_manual=true; SUB_TAG_DETECTED+="[FA]"; langs+="fa,"
              elif $FA_AUTO; then
                need_auto=true;   SUB_TAG_DETECTED+="[FA-Auto]"; langs+="fa,"
              else
                echo "⚠️  No FA subtitles (manual or auto) found — skipping FA."
              fi
            fi

            if [ "$want_en" = "true" ]; then
              if $EN_MANUAL; then
                need_manual=true; SUB_TAG_DETECTED+="[EN]"; langs+="en,"
              elif $EN_AUTO; then
                need_auto=true;   SUB_TAG_DETECTED+="[EN-Auto]"; langs+="en,"
              else
                echo "⚠️  No EN subtitles (manual or auto) found — skipping EN."
              fi
            fi

            langs="${langs%,}"   # trim trailing comma

            if [ -n "$langs" ]; then
              $need_manual && SUB_F_DETECTED+=" --write-subs"
              $need_auto   && SUB_F_DETECTED+=" --write-auto-subs"
              SUB_F_DETECTED+=" --embed-subs --sub-langs $langs --ignore-errors"
            fi
          }

          # ── Per-URL download loop ───────────────────────────────────────────
          for URL in $FORMATTED_URLS; do
            [ -z "$URL" ] && continue

            echo "==========================================="
            echo "Processing URL: $URL"
            echo "==========================================="

            # Resolve cookie arg for this URL (needed by detection + download)
            COOKIE_ARG=""
            if echo "$URL" | grep -qE "(youtube\.com|youtu\.be)"; then
              [ -s youtube_cookies.txt ] && COOKIE_ARG="--cookies youtube_cookies.txt"
            elif echo "$URL" | grep -qE "(pornhub\.com|phub\.net)"; then
              [ -s ph_cookies.txt ] && COOKIE_ARG="--cookies ph_cookies.txt"
            fi

            # Determine subtitle flags + tag for this URL
            if [ "$NEEDS_DETECTION" = "true" ] && \
               echo "$URL" | grep -qE "(youtube\.com|youtu\.be|twitch\.tv|reddit\.com|vimeo|soundcloud|pornhub\.com|phub\.net)"; then
              echo "🔍 Probing available subtitles..."
              detect_subs_for_url "$URL" "$COOKIE_ARG" "$DETECT_FA" "$DETECT_EN"
              SUB_F="$SUB_F_DETECTED"
              SUB_TAG="$SUB_TAG_DETECTED"
              [ -n "$SUB_TAG" ] && echo "✅ Subtitle tag resolved: $SUB_TAG"
            else
              SUB_F="$BASE_SUB_F"
              SUB_TAG="$STATIC_SUB_TAG"
            fi

            # Snapshot existing files so we can identify newly added ones after download
            mapfile -t BEFORE_FILES < <(ls tmp_downloads/ 2>/dev/null | sort)

            # ── Dispatch to correct downloader ──────────────────────────────
            if echo "$URL" | grep -qE "(bunkr\.si|bunkr\.fi|bunkr\.ru|bunkr\.cr|bunkr\.rip|bunkrr\.su)"; then
              echo "Downloading from Bunkr..."
              python3 bunkr.py "$URL" "tmp_downloads"

            elif echo "$URL" | grep -qE "(pornhub\.com|phub\.net)"; then
              echo "Downloading from PornHub with yt-dlp..."
              yt-dlp \
                --js-runtimes bun:$HOME/.bun/bin/bun \
                --remote-components ejs:github \
                $COOKIE_ARG \
                $YTDLP_F \
                $SUB_F \
                --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
                --add-header "Referer:https://www.pornhub.com/" \
                --add-header "Accept-Language:en-US,en;q=0.9" \
                -o "tmp_downloads/%(title)s.%(ext)s" \
                "$URL"

            elif echo "$URL" | grep -qE "(youtube\.com|youtu\.be|twitch\.tv|reddit\.com|vimeo|soundcloud)"; then
              echo "Downloading with yt-dlp..."
              yt-dlp \
                --js-runtimes bun:$HOME/.bun/bin/bun \
                --remote-components ejs:github \
                $COOKIE_ARG \
                $YTDLP_F \
                $SUB_F \
                -o "tmp_downloads/%(title)s.%(ext)s" \
                "$URL"

            else
              echo "Downloading direct file with aria2..."
              aria2c --split=2 --max-connection-per-server=2 --dir="tmp_downloads" "$URL"
            fi

            # ── Rename newly downloaded video/audio files with SUB_TAG ───────
            if [ -n "$SUB_TAG" ]; then
              mapfile -t AFTER_FILES < <(ls tmp_downloads/ 2>/dev/null | sort)
              mapfile -t NEW_FILES  < <(comm -13 <(printf '%s\n' "${BEFORE_FILES[@]}") \
                                                  <(printf '%s\n' "${AFTER_FILES[@]}"))

              for fname in "${NEW_FILES[@]}"; do
                fpath="tmp_downloads/$fname"
                [ -f "$fpath" ] || continue
                ext="${fname##*.}"
                # Skip subtitle sidecar files — only rename the actual media
                case "$ext" in
                  vtt|srt|ass|ssa|sub|ttml|srv1|srv2|srv3|json3)
                    rm -f "$fpath"   # clean up sidecar left by --write-subs
                    continue
                    ;;
                esac
                base="${fname%.*}"
                mv "$fpath" "tmp_downloads/${base} ${SUB_TAG}.${ext}"
                echo "📝 Renamed → ${base} ${SUB_TAG}.${ext}"
              done
            fi

          done

      - name: Zip & Split
        shell: bash
        run: |
          HAS_PASS="${{ github.event.inputs.password }}"
          FORCE_ZIP="${{ github.event.inputs.force_zip }}"
          LIMIT=$((95 * 1024 * 1024))

          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            BASENAME=$(basename "$FILE")

            rm -f "dl/${BASENAME}.zip" "dl/${BASENAME}.z"[0-9]*

            if [ -n "$HAS_PASS" ] || [ "$SIZE" -gt "$LIMIT" ] || [ "$FORCE_ZIP" = "true" ]; then
              echo "Zipping/Splitting: $BASENAME"

              PASS_ARG=""
              [ -n "$HAS_PASS" ] && PASS_ARG="-P $HAS_PASS"

              zip $PASS_ARG -s 95m "dl/${BASENAME}.zip" -j "$FILE"

              # .zip first, then numbered split parts (.z01, .z02, ...)
              # z[0-9]* intentionally excludes .zip to prevent duplicates
              for ZPART in "dl/${BASENAME}.zip"; do
                [ -f "$ZPART" ] && basename "$ZPART" >> new_files.txt
              done
              for ZPART in "dl/${BASENAME}".z[0-9]*; do
                [ -f "$ZPART" ] && basename "$ZPART" >> new_files.txt
              done

            else
              echo "File is under 95MB and no ZIP requested. Copying raw file..."
              cp -f "$FILE" "dl/$BASENAME"
              echo "$BASENAME" >> new_files.txt
            fi
          done
          rm -rf tmp_downloads

      - name: Update Links.md
        shell: bash
        run: |
          [ ! -f new_files.txt ] && exit 0

          REPO="${{ github.repository }}"
          BRANCH="${GITHUB_REF_NAME}"

          HEADER="## 🔗 Direct Download Links\n> Click on any link below to start downloading directly.<br><br/>\n\n"

          echo "### 📅 $(TZ='Asia/Tehran' date +'%Y-%m-%d %H:%M') IR" > current_run.md

          while IFS= read -r FNAME; do
            ENCODED_NAME=$(python3 -c "import urllib.parse; print(urllib.parse.quote(input()))" <<< "$FNAME")
            RAW_URL="https://github.com/$REPO/raw/$BRANCH/dl/$ENCODED_NAME"

            DISPLAY_NAME=$(echo "$FNAME" | sed -E 's/android[0-9]+\+_//g; s/-release//g')

            export FNAME_ENV="$FNAME"
            SIZE_STR=$(python3 -c "import os; fname = os.environ.get('FNAME_ENV'); path = f'dl/{fname}'; size = os.path.getsize(path) if os.path.exists(path) else 0; print(f'{size/1048576:.1f}MB' if size >= 1048576 else f'{size//1024}KB')")

            EXT="${FNAME##*.}"
            case "$EXT" in
              apk)                  ICON="📱" ;;
              mp4|mkv|avi|mov|webm) ICON="🎬" ;;
              mp3|m4a|flac|ogg)     ICON="🎵" ;;
              zip|z[0-9]*)          ICON="🗜️" ;;
              *)                    ICON="📥" ;;
            esac

            echo "- $ICON [$DISPLAY_NAME]($RAW_URL) \`$SIZE_STR\`" >> current_run.md
            echo "" >> current_run.md
          done < new_files.txt

          echo "---" >> current_run.md
          echo "" >> current_run.md

          if [ -f Links.md ]; then
            tail -n +4 Links.md > old_links.md 2>/dev/null || touch old_links.md
            echo -e "$HEADER" > Links.md
            cat current_run.md old_links.md >> Links.md
            rm old_links.md
          else
            echo -e "$HEADER" > Links.md
            cat current_run.md >> Links.md
          fi

          rm -f new_files.txt current_run.md

      - name: Push to Repository
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "NET-Sentinel Bot"
          git config user.email "224584266+NetSentinel-Bot@users.noreply.github.com"
          git add dl/ Links.md
          git commit -m "Add downloaded files via Panel [skip ci]" || echo "Nothing to commit"
          git push origin HEAD:$BRANCH
