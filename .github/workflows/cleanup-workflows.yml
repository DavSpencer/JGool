name: Delete workflow runs daily at midnight Tehran time

on:
  schedule:
    # Runs every day at 00:00 Tehran time
    - cron: '0 0 * * *'
      timezone: 'Asia/Tehran'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  delete-runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write  # Required to delete workflow runs
      contents: read   # Required to read repository info
    
    steps:
      - name: Delete all workflow runs
        uses: iamazeem/delete-workflow-runs-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Optional: keep last 5 runs instead of deleting all
          # keep: 5
